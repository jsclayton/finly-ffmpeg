name: build

# Repeatable FFmpeg build pipeline: bump version, re-run, test.
# Runs on macOS runners which ship Xcode + iOS/tvOS SDKs + simulators.
#
# Builds all four xcframeworks, runs the simulator smoke test and the XCTest
# suite, and publishes the xcframeworks + LGPL bundle as a release.
#
# TRIGGERS ONLY ON A `v*` TAG (or a manual `workflow_dispatch`). Pushing a
# branch, pushing `main`, and opening a pull request all do nothing. This is
# deliberate: the XCTest job cannot pass on a GitHub-hosted runner, so leaving it
# on every push and PR only produces a permanent red X that teaches nobody
# anything. Tag a release and it runs; otherwise the suite is run locally with
# `bash scripts/tools/run-range-tests.sh`.
#
# WHY IT CANNOT PASS on a hosted runner, unresolved. Every video fixture is
# minted at test time by AVAssetWriter/VideoToolbox, because this FFmpeg build
# ships no video encoders by design. A hosted runner has no GPU, and VideoToolbox
# wedges on the first H.264 encode: `BandwidthTests` fails with
# "timed out feeding (video 3/120 ...)" after accepting three frames of 320x240
# in 90 s. The suite takes 201 s there against 14 s locally. Two ways out: a
# self-hosted runner, or committing tiny H.264/HEVC fixtures the way
# `tiny-aac.mp4` already is, taking VideoToolbox off the critical path. Do NOT
# "fix" it by turning the failure into a skip -- that is how a real bug hides.
#
# When one of those lands, restore `branches: [main]` and `pull_request:` below.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # needed for the release job on tags

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.app || sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"

      - name: Show toolchain
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version
          xcrun --sdk appletvos --show-sdk-version

      - name: Build xcframeworks + LGPL bundle
        run: ./build.sh

      - name: Smoke test (simulator link + run)
        run: ./scripts/smoke-test.sh

      # The XCTest suite needs the xcframeworks this job just built (Package.swift
      # uses local-path binaryTargets), so it runs here rather than in its own job.
      #
      # Tests that need media the runner doesn't have skip themselves: RealMKVTests,
      # BFrameTimingTests, AVSyncTests, FragmenterEAC3Tests and the real-media halves
      # of the others are gated on build/mkv-fixture.txt. HTTPRangeTests do run — the
      # wrapper builds the Go origin server, and Go ships on the macOS runner.
      - name: Run XCTest suite (iOS simulator)
        run: |
          set -euo pipefail
          DEST="$(bash scripts/tools/sim-destination.sh)"
          echo "destination: $DEST"
          MUSKET_DESTINATION="$DEST" bash scripts/tools/run-range-tests.sh

      - name: Package artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          for fw in artifacts/xcframework/*.xcframework; do
            name="$(basename "$fw" .xcframework)"
            ( cd artifacts/xcframework && zip -qry "../../dist/${name}.xcframework.zip" "${name}.xcframework" )
          done
          cp artifacts/lgpl/*.tar.gz dist/
          # checksums for .binaryTarget(url:checksum:) consumers
          ( cd dist && for z in *.xcframework.zip; do
              echo "$(swift package --package-path "$GITHUB_WORKSPACE" compute-checksum "$z" 2>/dev/null || shasum -a 256 "$z" | awk '{print $1}')  $z"
            done | tee checksums.txt )

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xcframeworks
          path: dist/
          retention-days: 14

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - run: ./build.sh
      - name: Package
        run: |
          set -euo pipefail
          mkdir -p dist
          for fw in artifacts/xcframework/*.xcframework; do
            name="$(basename "$fw" .xcframework)"
            ( cd artifacts/xcframework && zip -qry "../../dist/${name}.xcframework.zip" "${name}.xcframework" )
          done
          cp artifacts/lgpl/*.tar.gz dist/
          ( cd dist && for z in *.xcframework.zip; do shasum -a 256 "$z"; done > checksums.txt )
      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: dist/checksums.txt
