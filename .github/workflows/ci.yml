name: build

# Repeatable FFmpeg build pipeline: bump version, re-run, release.
# Runs on macOS runners which ship Xcode + iOS/tvOS SDKs + simulators.
#
# Builds the four xcframeworks + the LGPL compliance bundle and runs the
# simulator smoke test — a from-scratch REPRODUCIBILITY CHECK, not the release
# publisher. Releases are cut by scripts/release.sh from the locally built,
# suite-verified artifacts: the checksums in Package.swift must match the exact
# bytes uploaded, so a runner rebuild must never overwrite release assets.
#
# TRIGGERS ONLY ON A `v*` TAG (or a manual `workflow_dispatch`). Pushing a
# branch, pushing `main`, and opening a pull request all do nothing. This is
# deliberate: a full 6-arch FFmpeg cross-compile is far too heavy to run on every
# push and PR. Tag a release and the pipeline runs; day-to-day iteration builds
# locally with `./build.sh`.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write   # needed for the release job on tags

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.app || sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"

      - name: Show toolchain
        run: |
          xcodebuild -version
          xcrun --sdk iphoneos --show-sdk-version
          xcrun --sdk appletvos --show-sdk-version

      - name: Build xcframeworks + LGPL bundle
        run: ./build.sh

      - name: Smoke test (simulator link + run)
        run: ./scripts/smoke-test.sh

      - name: Package artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          for fw in artifacts/xcframework/*.xcframework; do
            name="$(basename "$fw" .xcframework)"
            ( cd artifacts/xcframework && zip -qry "../../dist/${name}.xcframework.zip" "${name}.xcframework" )
          done
          cp artifacts/lgpl/*.tar.gz dist/
          # checksums for .binaryTarget(url:checksum:) consumers
          ( cd dist && for z in *.xcframework.zip; do
              echo "$(swift package --package-path "$GITHUB_WORKSPACE" compute-checksum "$z" 2>/dev/null || shasum -a 256 "$z" | awk '{print $1}')  $z"
            done | tee checksums.txt )

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xcframeworks
          path: dist/
          retention-days: 14
